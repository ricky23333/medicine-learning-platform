worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # 后端服务地址（使用宿主机网关，若失败则换为 43.138.173.69:5880）
    upstream backend {
        server host.docker.internal:5880;
    }

    # ========== 1. HTTP 强制跳转 HTTPS ==========
    server {
        listen 80;
        server_name dhtcm.cn;
        return 301 https://$host$request_uri;
    }

    # ========== 2. 主站 HTTPS (admin-ui + API 代理) ==========
    server {
        listen 443 ssl http2;
        server_name dhtcm.cn;

        ssl_certificate     /etc/nginx/certs/dhtcm.cn.crt;   # 修改为你的证书文件名
        ssl_certificate_key /etc/nginx/certs/dhtcm.cn.key;   # 修改为你的私钥文件名
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 前端静态文件（admin-ui）
        location / {
            root /usr/share/nginx/html/admin-ui;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;   # SPA 路由支持
        }

        # 后端 API 代理（将所有 /api/* 请求转发到后端）
        location /api/ {
            proxy_pass http://backend/;          # 注意：/api 前缀会被剥离
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ========== 3. 8002 端口服务 (app-ui) ==========
    server {
        listen 8001 ssl http2;        # 容器内监听 8001，宿主机映射为 8002
        server_name dhtcm.cn;

        ssl_certificate     /etc/nginx/certs/dhtcm.cn.crt;
        ssl_certificate_key /etc/nginx/certs/dhtcm.cn.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            root /usr/share/nginx/html/app-ui;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}