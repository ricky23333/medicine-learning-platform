services:
  nginx:
    image: nginx:latest
    container_name: my-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"      # HTTPS 端口
      - "8001:8001"    # 8001 端口映射
    volumes:
      # 1. 映射 Nginx 主配置文件 (只读映射即可)
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      # 2. 映射日志目录 (需要读写权限，不要加 :ro)
      - ./logs:/var/log/nginx
      # 3. (补充推荐) 映射网站静态文件目录
      - ./html:/usr/share/nginx/html:ro
      # 3. (补充推荐) 映射网站静态文件目录
      - ./certs:/etc/nginx/certs:ro  # 新增：挂载证书目录（只读）